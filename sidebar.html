<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Translator Sidebar</title>
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body>
    <div class="sidebar-shell">
      <header>
        <h1>Translate Selection</h1>
        <p>Select any text on the page and it will appear here instantly.</p>
      </header>

      <section class="control-row">
        <label for="targetLang">Translate to</label>
        <select id="targetLang">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="zh">Chinese</option>
        </select>
      </section>

      <section class="card">
        <div class="card-title">Selected text</div>
        <div id="sourceText" class="content">Nothing selected yet.</div>
      </section>

      <section class="card">
        <div class="card-title">Translation</div>
        <div id="translation" class="content">The translation will appear here.</div>
      </section>

      <section class="manual-block">
        <div class="card-title">Translate text manually</div>
        <textarea id="manualText" placeholder="Type or paste text to translate"></textarea>
        <button id="translateBtn">Translate</button>
      </section>

      <div id="status" class="status">Waiting for selection…</div>
    </div>

    <script src="sidebar.js"></script>
  </body>
</html>
