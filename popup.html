<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Insight</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <h1>Page Insight</h1>
      <div class="actions">
        <button id="refreshBtn">Analyze page</button>
        <button id="copyBtn">Copy summary</button>
      </div>
      <div id="status" class="status">Analyzing…</div>

      <div class="summary-card">
        <div class="summary-label">Title</div>
        <div id="title" class="summary-value">-</div>
        <div class="summary-label">Reading time</div>
        <div id="readTime" class="summary-value">0 min</div>
      </div>

      <div class="section">
        <h2>Quick summary</h2>
        <ul id="summaryList"></ul>
      </div>

      <div class="section">
        <h2>Key topics</h2>
        <div id="keywords" class="keywords"></div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
